<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Page introuvable · Irmane</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Albert+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/tokens.css">
<script>
(function(){try{var s=localStorage.getItem('site-theme-pref:v1');if(s!=='light'&&s!=='dark'){s=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light';}document.documentElement.setAttribute('data-theme',s);}catch(e){}})();
</script>
<style>
  html[data-theme] body { background: var(--paper); color: var(--ink); }
  .nf-wrap {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 48px 24px;
    gap: 4px;
  }
  .nf-mono {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; letter-spacing: 2.5px; text-transform: uppercase;
    color: var(--accent-soft-ink); font-weight: 500; margin-bottom: 18px;
  }
  .nf-code {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 600;
    font-size: clamp(96px, 26vw, 240px);
    line-height: .82; letter-spacing: -.05em;
    color: var(--accent);
  }
  .nf-title {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 600;
    font-size: clamp(24px, 5vw, 36px);
    letter-spacing: -.02em;
    margin-top: 28px;
  }
  .nf-text {
    font-family: 'Albert Sans', sans-serif;
    font-size: 16.5px; line-height: 1.6; color: var(--ink-2);
    max-width: 440px; margin-top: 14px; text-wrap: pretty;
  }
  .nf-actions { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 34px; }
  .nf-btn {
    display: inline-flex; align-items: center; gap: 9px;
    height: 50px; padding: 0 24px; border-radius: 999px;
    font-family: 'Albert Sans', sans-serif; font-size: 15px; font-weight: 600;
    transition: transform .18s ease, background .2s, border-color .2s;
  }
  .nf-btn:hover { transform: translateY(-2px); }
  .nf-fill { background: var(--accent); color: #fff; }
  .nf-outline { border: 1px solid var(--line-strong); color: var(--ink); }
  .nf-outline:hover { border-color: var(--ink); }
  .nf-links { display: flex; flex-wrap: wrap; gap: 6px 22px; justify-content: center; margin-top: 40px; }
  .nf-links a {
    font-family: 'Albert Sans', sans-serif; font-size: 14px; color: var(--ink-muted);
    border-bottom: 1px solid transparent; transition: color .2s, border-color .2s; padding-bottom: 2px;
  }
  .nf-links a:hover { color: var(--accent); border-bottom-color: var(--accent); }
</style>
</head>
<body>
<div class="nf-wrap">
  <div class="nf-mono">Erreur 404</div>
  <div class="nf-code">404</div>
  <h1 class="nf-title">Cette page s'est envolée</h1>
  <p class="nf-text">Le lien est peut-être erroné ou la page a été déplacée. Pas de panique — revenons sur la bonne voie.</p>
  <div class="nf-actions">
    <a class="nf-btn nf-fill" href="/">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Retour à l'accueil
    </a>
    <a class="nf-btn nf-outline" href="/projets/">Voir mes projets</a>
  </div>
  <nav class="nf-links">
    <a href="/projets/">Mes projets</a>
    <a href="/apropos/">À propos</a>
    <a href="/contact/">Me contacter</a>
  </nav>
</div>
</body>
</html>
